<!DOCTYPE html>
<html lang="en" data-root="..">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Writing | Mike Whyle</title>
  <meta name="description" content="Writing by Mike Whyle: The News Drop weekly AI dispatch, published commentary, client work and longform. Technology, AI and Africa, argued from Cape Town.">
  <meta property="og:title" content="Writing | Mike Whyle">
  <meta property="og:description" content="The News Drop archive, commentary, client work and longform, kept in a monolith.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://portfolio.mikewhyle.com/assets/journey/goddess-full-m.webp">
  <link rel="icon" href="../favicon.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    html { background: #0d0b09; }
    body { margin: 0; background: #0d0b09; color: #f0ede6; }
    #chamber-loader { position: fixed; inset: 0; z-index: 200; background: #000;
      display: grid; place-items: center; }
  </style>
  <link rel="stylesheet" href="../css/overhaul.css?v=3">
</head>
<body class="overhaul writing-page">

  <noscript>
    <div class="noscript-poster">
      <p>The cube needs JavaScript to turn. The writing lives here too:</p>
      <nav><a href="../projects/writing/">Writing archive</a></nav>
    </div>
  </noscript>

  <div id="chamber-loader">
    <div class="chamber-moon">
      <img src="../assets/journey/moon-3.webp" alt="">
      <div class="chamber-moon-fill"><img src="../assets/journey/moon-3.webp" alt=""></div>
    </div>
  </div>

  <header class="veil-nav">
    <a href="../#reading" class="veil-mark return-mark" id="return-reading" aria-label="Mike Whyle, back to the reading">
      <img src="../assets/brand/mikey-logo.webp" alt="Mikey">
    </a>
    <button id="mute-btn" aria-label="Mute">
      <svg class="wave" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M4 9v6h4l5 4V5L8 9H4z" fill="currentColor" stroke="none"/><path d="M16 9a4 4 0 0 1 0 6"/><path d="M18.5 6.5a8 8 0 0 1 0 11"/></svg>
      <svg class="strike" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M4 9v6h4l5 4V5L8 9H4z" fill="currentColor" stroke="none"/><path d="M16 8l6 8M22 8l-6 8"/></svg>
    </button>
  </header>

  <span class="chamber-edge"><em>ii</em> Human Thinking</span>

  <main>
    <section id="cube-scene" aria-label="The writing collections">
      <div id="cube"><!-- faces built by cube.js --></div>
      <p class="cube-hint">Drag to turn · click a tile to read, or the face for all</p>
    </section>
  </main>

  <!-- the reading plane: a face zoomed to full screen -->
  <div id="reading-plane" aria-hidden="true">
    <div class="plane-inner" id="plane-inner"></div>
  </div>
  <button class="plane-close" id="plane-close" hidden>Close</button>

  <div class="grain-veil"></div>

  <script src="../js/data.js"></script>
  <script src="../content/newsdrop/index.js"></script>
  <script src="../js/vendor/gsap.min.js?v=3"></script>
  <script src="../js/vendor/ScrollTrigger.min.js?v=3"></script>
  <script type="module">
    import { initChamberLoader } from '../js/core/loader.js';
    import { WritingCube } from '../js/core/cube.js';
    import { audio, mountMuteButton } from '../js/core/audio.js';
    import { qs } from '../js/core/util.js';
    import { initCursor } from '../js/core/cursor.js';

    mountMuteButton();
    initCursor();

    for (const a of document.querySelectorAll('#return-reading')) {
      a.addEventListener('click', () => sessionStorage.setItem('mw-return', '1'));
    }

    const plane = qs('#reading-plane');
    const inner = qs('#plane-inner');
    const closeBtn = qs('#plane-close');
    const esc = (s) => s.replace(/&/g, '&amp;').replace(/</g, '&lt;');

    const faces = WRITING_FACES.map((f) => ({
      ...f,
      count: f.type === 'newsdrop'
        ? `${NEWSDROP.length} issues, growing weekly`
        : `${f.items.length} ${f.items.length === 1 ? 'piece' : 'pieces'}`,
      // tiles for the cube face: News Drop shows its newest issues, the
      // rest reachable through the full plane
      entries: f.type === 'newsdrop'
        ? NEWSDROP.map((it) => ({ label: `#${it.n}`, title: it.title, kind: 'issue', file: it.file, n: it.n, date: it.date }))
        : f.items.map((s) => ({ title: s.title, kind: 'story', url: s.url })),
    }));

    /* ---- the reading plane ---- */
    let cube;
    function openPlane(face) {
      cube.suspended = true;
      plane.classList.add('is-open');
      plane.setAttribute('aria-hidden', 'false');
      closeBtn.hidden = false;
      plane.scrollTop = 0;
      if (face.type === 'newsdrop') renderIssueList(face);
      else renderStories(face);
      closeBtn.focus();
    }
    function closePlane() {
      plane.classList.remove('is-open');
      plane.setAttribute('aria-hidden', 'true');
      closeBtn.hidden = true;
      cube.suspended = false;
    }
    /* a single tile: an issue opens straight to its reading view, a story
       opens in its own tab */
    function openCell(entry, face) {
      if (entry.kind === 'issue') {
        cube.suspended = true;
        plane.classList.add('is-open');
        plane.setAttribute('aria-hidden', 'false');
        closeBtn.hidden = false;
        plane.scrollTop = 0;
        openIssue({ file: entry.file, n: entry.n, date: entry.date, title: entry.title });
        closeBtn.focus();
      } else {
        window.open(entry.url, '_blank', 'noopener');
      }
    }
    closeBtn.addEventListener('click', () => {
      // step back through the plane's own states before closing
      if (inner.dataset.view === 'issue') renderIssueList(faces[0]);
      else closePlane();
    });
    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && plane.classList.contains('is-open')) closeBtn.click();
    });

    function renderStories(face) {
      inner.dataset.view = 'list';
      inner.innerHTML = `
        <p class="plane-eyebrow">${face.eyebrow}</p>
        <ul class="issue-list">
          ${face.items.map((s) => `
            <li>
              <a href="${s.url}" target="_blank" rel="noopener">
                <span class="issue-title">${esc(s.title)}</span>
                <span class="issue-date">read &rarr;</span>
              </a>
              <p class="issue-excerpt">${esc(s.excerpt)}</p>
            </li>`).join('')}
        </ul>`;
    }

    function renderIssueList() {
      inner.dataset.view = 'list';
      inner.innerHTML = `
        <p class="plane-eyebrow">The News Drop · the weekly AI dispatch</p>
        <ul class="issue-list">
          ${NEWSDROP.map((it) => `
            <li>
              <button data-file="${it.file}" data-n="${it.n}" data-date="${it.date}" data-title="${esc(it.title)}">
                <span class="issue-num">#${it.n}</span>
                <span class="issue-title">${esc(it.title)}</span>
                <span class="issue-date">${it.date}</span>
              </button>
            </li>`).join('')}
        </ul>`;
      inner.querySelectorAll('button[data-file]').forEach((b) => {
        b.addEventListener('click', () => openIssue(b.dataset));
      });
    }

    /* an issue opens as a clean typographic reading view from plain text */
    async function openIssue({ file, n, date, title }) {
      inner.dataset.view = 'issue';
      inner.innerHTML = `<p class="plane-eyebrow">Fetching issue ${n}&hellip;</p>`;
      let text = '';
      try {
        text = await (await fetch(`../content/newsdrop/${file}`)).text();
      } catch {
        inner.innerHTML = `<p class="plane-eyebrow">This issue would not be summoned. Try again.</p>`;
        return;
      }
      const lines = text.split('\n');
      const bodyLines = lines.slice(1);
      const paras = bodyLines.join('\n').split(/\n\s*\n/).map((s) => s.trim()).filter(Boolean);
      const emojiLead = /^[^\w\s"'‘“(]/u;
      const html = paras.map((p) => {
        const clean = esc(p).replace(/\s*(→|->) ?LINK\.?/g, '');
        const lines = clean.split('\n');
        const first = lines[0].trim();
        let out = '';
        if (first.length < 80 && emojiLead.test(p) && !/^[.…]/.test(p)) {
          out += `<p class="drop-heading">${first}</p>`;
          lines.shift();
        }
        if (lines.length) out += `<p>${lines.join('<br>')}</p>`;
        return out;
      }).join('');
      inner.innerHTML = `
        <div class="issue-body">
          <button class="plane-close back-to-list" style="position:static">&larr; All issues</button>
          <h1>${esc(title)}</h1>
          <p class="issue-meta">The News Drop #${n} · ${date}</p>
          ${html}
        </div>`;
      inner.querySelector('.back-to-list').addEventListener('click', renderIssueList);
      plane.scrollTop = 0;
    }

    /* ---- the cube ---- */
    cube = new WritingCube(qs('#cube'), faces, { onSelect: openPlane, onCell: openCell });
    let last = performance.now();
    const loop = (now) => {
      cube.tick(Math.min((now - last) / 1000, 0.1), now / 1000);
      last = now;
      requestAnimationFrame(loop);
    };
    requestAnimationFrame(loop);

    initChamberLoader(['../assets/cards/card-back.webp', '../assets/journey/moth-full-m.webp']);

    const resume = () => {
      audio.start(audio.muted);
      audio.setMix({ sky: 0.18, earth: 0.06, sea: 0, fire: 0 });
    };
    window.addEventListener('pointerdown', resume, { once: true });
    window.addEventListener('keydown', resume, { once: true });
  </script>
</body>
</html>
