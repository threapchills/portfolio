<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mike Whyle | Portfolio</title>
  <meta name="description" content="Portfolio of Mike Whyle: GenAI filmmaker, creative director, copywriter, and vibe-coder. Cape Town.">
  <meta property="og:title" content="Mike Whyle | Portfolio">
  <meta property="og:description" content="GenAI filmmaking, graphic design, writing, and vibe-coded apps.">
  <meta property="og:type" content="website">
  <link rel="icon" href="favicon.png" type="image/png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ── Nav ─────────────────────────────────────────────── -->
  <nav class="nav" id="main-nav">
    <a href="/" class="nav-logo-link">
      <img src="images/mikelogo.png" alt="Mike Whyle" class="nav-logo">
    </a>
    <button class="nav-menu-btn" id="menu-btn" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <div class="nav-external">
      <a href="https://mikewhyle.com" target="_blank" rel="noopener">mikewhyle.com</a>
    </div>
  </nav>

  <!-- ── Menu overlay ─────────────────────────────────────── -->
  <div class="menu-overlay" id="menu-overlay">
    <button class="menu-overlay-close" id="menu-close">Close</button>
    <ul class="menu-list" id="menu-list">
      <!-- injected by JS -->
    </ul>
  </div>

  <!-- ── Project panels ───────────────────────────────────── -->
  <main id="panels">
    <!-- injected by JS -->
  </main>

  <!-- ── Footer ───────────────────────────────────────────── -->
  <footer class="site-footer">
    <span class="footer-text">© 2026 Mike Whyle</span>
    <a href="https://mikewhyle.com" target="_blank" rel="noopener" class="footer-link">mikewhyle.com →</a>
  </footer>

  <script src="js/data.js"></script>
  <script>
    /* ── Menu overlay ──────────────────────────────────────── */
    const menuList = document.getElementById('menu-list');
    PROJECTS.forEach(p => {
      const li = document.createElement('li');
      li.innerHTML = `<a href="projects/${p.id}/"><span class="menu-index">${p.index}</span>${p.title}</a>`;
      menuList.appendChild(li);
    });

    const overlay = document.getElementById('menu-overlay');
    document.getElementById('menu-btn').addEventListener('click', () => overlay.classList.add('open'));
    document.getElementById('menu-close').addEventListener('click', () => overlay.classList.remove('open'));
    overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });

    /* ── Panels ────────────────────────────────────────────── */
    const main = document.getElementById('panels');

    PROJECTS.forEach((p, i) => {
      // Determine hero background
      let bgHTML = '';
      if (p.heroVideo) {
        bgHTML = `
          <div class="panel-bg" id="bg-${p.id}">
            <video autoplay muted loop playsinline preload="none" poster="${p.heroFallback || ''}">
              <source src="${p.heroVideo}" type="video/mp4">
            </video>
          </div>`;
      } else if (p.heroSlides) {
        // First slide as static bg on landing page
        bgHTML = `<div class="panel-bg" id="bg-${p.id}" style="background-image:url('${p.heroSlides[0]}')"></div>`;
      } else {
        const img = p.heroImage || p.heroFallback || '';
        bgHTML = `<div class="panel-bg" id="bg-${p.id}" style="background-image:url('${img}')"></div>`;
      }

      const panel = document.createElement('div');
      panel.className = 'project-panel';
      panel.dataset.project = p.id;
      panel.innerHTML = `
        ${bgHTML}
        <span class="panel-num">${p.index}</span>
        <div class="panel-content">
          <span class="panel-index">${p.index} / ${p.category}</span>
          <h2 class="panel-title">${p.title}</h2>
          <div class="panel-meta">
            <span class="panel-category">${p.type}</span>
            ${p.skills.slice(0, 3).map(s => `<span class="panel-tag">${s}</span>`).join('')}
          </div>
          <span class="panel-cta">View Project</span>
        </div>`;

      panel.addEventListener('click', () => {
        window.location.href = `projects/${p.id}/`;
      });

      main.appendChild(panel);

      // Divider between panels (not after last)
      if (i < PROJECTS.length - 1) {
        const div = document.createElement('div');
        div.className = 'panel-divider';
        main.appendChild(div);
      }
    });

    /* ── Sticky nav on scroll ──────────────────────────────── */
    const nav = document.getElementById('main-nav');
    const onScroll = () => {
      nav.classList.toggle('scrolled', window.scrollY > 60);
    };
    window.addEventListener('scroll', onScroll, { passive: true });

    /* ── Reveal on scroll (IntersectionObserver) ───────────── */
    const observer = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('visible');
          observer.unobserve(e.target);
        }
      });
    }, { threshold: 0.15 });

    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

    /* ── Lazy-load panel videos on approach ────────────────── */
    const videoObs = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          const vid = e.target.querySelector('video');
          if (vid && vid.preload === 'none') {
            vid.preload = 'auto';
            vid.load();
            vid.play().catch(() => {});
          }
        }
      });
    }, { rootMargin: '200px' });

    document.querySelectorAll('.project-panel').forEach(p => videoObs.observe(p));
  </script>
</body>
</html>
