<!DOCTYPE html>
<html lang="en" data-root="..">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Film | Mike Whyle</title>
  <meta name="description" content="GenAI filmmaking by Mike Whyle: Kalimba, Ramses, Ice Tea, Tale of Twins, and the archive. Cinematic AI film made in Cape Town.">
  <meta property="og:title" content="Film | Mike Whyle">
  <meta property="og:description" content="Scrub through the world of the Mikey spec film, then walk the rack.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://portfolio.mikewhyle.com/images/kalimba/thumb.webp">
  <link rel="icon" href="../favicon.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    html { background: #050403; }
    body { margin: 0; background: #050403; color: #f0ede6; }
    #chamber-loader { position: fixed; inset: 0; z-index: 200; background: #000;
      display: grid; place-items: center; }
  </style>
  <link rel="stylesheet" href="../css/overhaul.css?v=3">
</head>
<body class="overhaul film-page">

  <noscript>
    <div class="noscript-poster">
      <p>The film chamber needs JavaScript. The films themselves are patient:</p>
      <nav><a href="../projects/kalimba/">Kalimba</a> <a href="../projects/ramses/">Ramses</a> <a href="../projects/ice-tea/">Ice Tea</a> <a href="../projects/tale-of-twins/">Tale of Twins</a> <a href="../projects/video-archive/">Archive</a></nav>
    </div>
  </noscript>

  <div id="chamber-loader">
    <div class="chamber-moon">
      <img src="../assets/journey/moon-3.webp" alt="">
      <div class="chamber-moon-fill"><img src="../assets/journey/moon-3.webp" alt=""></div>
    </div>
  </div>

  <header class="veil-nav">
    <a href="../#reading" class="veil-mark return-mark" id="return-reading" aria-label="Mike Whyle, back to the reading">
      <img src="../assets/brand/mikey-logo.webp" alt="Mikey">
    </a>
    <button id="mute-btn" aria-label="Mute">
      <svg class="wave" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M4 9v6h4l5 4V5L8 9H4z" fill="currentColor" stroke="none"/><path d="M16 9a4 4 0 0 1 0 6"/><path d="M18.5 6.5a8 8 0 0 1 0 11"/></svg>
      <svg class="strike" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M4 9v6h4l5 4V5L8 9H4z" fill="currentColor" stroke="none"/><path d="M16 8l6 8M22 8l-6 8"/></svg>
    </button>
  </header>

  <span class="chamber-edge"><em>i</em> Human Being</span>

  <main>
    <!-- the hero scrub: the chamber's cinematic introduction -->
    <section id="scrub-wrap" aria-label="The Mikey spec film">
      <div id="scrub-stage" class="vignette">
        <canvas id="scrub-canvas"></canvas>
        <div class="letterbox letterbox-top" id="lb-top"></div>
        <div class="letterbox letterbox-bottom" id="lb-bottom"></div>
        <div class="scrub-brand" id="scrub-brand">
          <img src="../assets/brand/mikey-logo.webp" alt="Mikey">
          <p>A spec film. This is what cinematic AI looks like now.</p>
          <a class="scrub-cta" href="../projects/mikey/">Enter the film &rarr;</a>
        </div>
      </div>
    </section>

    <!-- the films, full-bleed hero banners -->
    <section id="film-banners" aria-label="The films"><!-- banners injected --></section>

    <section class="chamber-outro">
      <h2 class="outro-title">More where that came from.</h2>
      <div class="outro-contact">
        <a class="contact-pill" href="../#reading" id="outro-return">Return to the reading</a>
        <a class="contact-pill" href="mailto:mikewhyle@gmail.com">Email</a>
        <a class="contact-pill" href="https://wa.me/27616554726" target="_blank" rel="noopener">WhatsApp</a>
      </div>
      <p class="outro-credit">&copy; 2026 Mike Whyle</p>
    </section>
  </main>

  <div class="grain-veil"></div>

  <script src="../js/data.js"></script>
  <script src="../js/vendor/gsap.min.js?v=3"></script>
  <script src="../js/vendor/ScrollTrigger.min.js?v=3"></script>
  <script src="../js/vendor/lenis.min.js?v=3"></script>
  <script type="module">
    import { initChamberLoader } from '../js/core/loader.js';
    import { FrameScrubber } from '../js/core/sequence.js';
    import { audio, mountMuteButton } from '../js/core/audio.js';
    import { IS_MOBILE, clamp, seg } from '../js/core/util.js';
    import { initCursor } from '../js/core/cursor.js';

    gsap.registerPlugin(ScrollTrigger);
    mountMuteButton();
    initCursor();
    history.scrollRestoration = 'manual';
    scrollTo(0, 0);

    // mark the way home: back means the table, not the threshold
    for (const a of document.querySelectorAll('#return-reading, #outro-return')) {
      a.addEventListener('click', () => sessionStorage.setItem('mw-return', '1'));
    }

    const lenis = new Lenis({ lerp: IS_MOBILE ? 0.12 : 0.09 });
    lenis.on('scroll', ScrollTrigger.update);
    gsap.ticker.add((t) => lenis.raf(t * 1000));
    gsap.ticker.lagSmoothing(0);
    window.__lenis = lenis;

    /* ---- the scrub ---- */
    const canvas = document.getElementById('scrub-canvas');
    const scrubber = new FrameScrubber(canvas, {
      dir: IS_MOBILE ? '../video/mikey/frames-800' : '../video/mikey/frames',
      count: 317,
    });
    const brand = document.getElementById('scrub-brand');
    const lbTop = document.getElementById('lb-top');
    const lbBottom = document.getElementById('lb-bottom');

    let scrubP = 0;
    ScrollTrigger.create({
      trigger: '#scrub-wrap',
      start: 'top top',
      end: 'bottom bottom',
      scrub: true,
      onUpdate: (self) => { scrubP = self.progress; },
    });

    /* ---- the films, as full-bleed banners ---- */
    const films = PROJECTS
      .filter((p) => p.chamber === 'film' && p.id !== 'video-archive')
      .sort((a, b) => a.chamberOrder - b.chamberOrder);
    const rel = (path) => path ? path.replace('../../', '../') : '';
    const ext = (path) => /^https?:/i.test(path) ? path : '../' + path;

    const fromProject = (f) => ({
      title: f.title,
      tag: `${f.category} · ${f.index}`,
      poster: rel(f.heroFallback || f.heroImage || (f.gallery && f.gallery[0]) || ''),
      loop: f.rackLoop ? `../${f.rackLoop}` : '',
      href: `../projects/${f.id}/`,
    });
    const fromExtra = (x) => ({
      title: x.title, tag: x.tag,
      poster: ext(x.poster),
      loop: x.loop ? `../${x.loop}` : '',
      href: x.href, external: !!x.external,
    });

    const banners = [...films.map(fromProject), ...RACK_EXTRAS.map(fromExtra)];
    const wrap = document.getElementById('film-banners');
    const mediaEls = [];

    banners.forEach((item, i) => {
      const el = document.createElement('a');
      el.className = 'film-banner';
      el.href = item.href;
      if (item.external) { el.target = '_blank'; el.rel = 'noopener'; }
      const clean = String(item.title).replace(/<[^>]+>/g, '');
      el.innerHTML = `
        <span class="banner-media">
          <img src="${item.poster}" alt="${clean} still" loading="lazy">
          ${item.loop ? `<video muted loop playsinline preload="none" src="${item.loop}"></video>` : ''}
        </span>
        <span class="banner-caption">
          <span class="banner-num">${String(i + 1).padStart(2, '0')}</span>
          <h3>${item.title}</h3>
          <span class="banner-tag">${item.tag}<em>${item.external ? 'Watch &rarr;' : 'Open &rarr;'}</em></span>
        </span>`;
      wrap.appendChild(el);
      mediaEls.push(el.querySelector('.banner-media'));
    });

    // the More Films door closes the walk
    const more = document.createElement('a');
    more.className = 'film-banner is-more';
    more.href = '../projects/video-archive/';
    more.innerHTML = `
      <span class="banner-caption is-centre">
        <span class="banner-num">${String(banners.length + 1).padStart(2, '0')}</span>
        <h3>More films</h3>
        <span class="banner-tag">The rest of the reel<em>Enter &rarr;</em></span>
      </span>`;
    wrap.appendChild(more);

    // clips wake when their banner holds the frame, and sleep when it leaves
    const io = new IntersectionObserver((entries) => {
      for (const e of entries) {
        const v = e.target.querySelector('video');
        if (!v) continue;
        if (e.isIntersecting) v.play().then(() => v.classList.add('is-playing')).catch(() => {});
        else { v.pause(); v.classList.remove('is-playing'); }
      }
    }, { threshold: 0.5 });
    wrap.querySelectorAll('.film-banner').forEach((b) => io.observe(b));

    /* ---- frame loop: the scrub, and the scroll-velocity warp that glues
       the films to the journey ---- */
    let last = performance.now();
    let sVel = 0;
    gsap.ticker.add(() => {
      const now = performance.now();
      const dt = Math.min((now - last) / 1000, 0.1);
      last = now;
      scrubber.setProgress(scrubP);
      scrubber.tick(dt);
      const bo = 1 - seg(scrubP, 0.16, 0.26);
      const bOp = seg(scrubP, 0.02, 0.06) * bo;
      brand.style.opacity = bOp.toFixed(3);
      brand.style.pointerEvents = bOp > 0.15 ? 'auto' : 'none';
      const lb = seg(scrubP, 0.02, 0.12) * (1 - seg(scrubP, 0.86, 0.98));
      lbTop.style.transform = `scaleY(${lb.toFixed(3)})`;
      lbBottom.style.transform = `scaleY(${lb.toFixed(3)})`;

      // the warp: momentum stretches and shears whichever film owns the frame
      sVel += ((lenis.velocity || 0) - sVel) * (1 - Math.exp(-8 * dt));
      const stretch = clamp(Math.abs(sVel) * 0.0012, 0, 0.045);
      const shear = clamp(sVel * 0.05, -1.6, 1.6);
      for (const m of mediaEls) {
        const r = m.getBoundingClientRect();
        if (r.bottom < 0 || r.top > innerHeight) continue;
        m.style.transform = `scaleY(${(1 + stretch).toFixed(4)}) skewX(${shear.toFixed(3)}deg)`;
      }
    });

    /* ---- chamber loader: preload the frames behind the moon ---- */
    document.body.style.overflow = 'hidden';
    const fill = document.querySelector('.chamber-moon-fill');
    initChamberLoader([], [
      scrubber.preload((p) => { fill.style.transform = `scaleY(${p})`; }),
    ]).then(() => {
      document.body.style.overflow = '';
      scrubber.draw(true);
      ScrollTrigger.refresh();
    });

    /* soft chamber bed once sound is unlocked by any gesture */
    const resume = () => {
      audio.start(audio.muted);
      audio.setMix({ fire: 0.20, sea: 0.08, sky: 0, earth: 0 });
    };
    window.addEventListener('pointerdown', resume, { once: true });
    window.addEventListener('keydown', resume, { once: true });
  </script>
</body>
</html>
