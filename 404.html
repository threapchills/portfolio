<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lost | Mike Whyle</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="/favicon.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;1,400&family=Space+Grotesk:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/overhaul.css">
  <style>
    .lost {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 2.2rem;
      text-align: center;
      padding: 2rem;
      background: #000;
    }
    .lost img { width: 64px; opacity: 0.85; }
    .lost h1 {
      font-family: var(--font-display);
      font-weight: 500;
      font-size: clamp(1.8rem, 5vw, 3rem);
      margin: 0;
      color: var(--text);
    }
    .lost p { color: var(--text); opacity: 0.6; margin: 0; max-width: 34ch; line-height: 1.6; }
    .lost a {
      color: var(--moon);
      font-family: var(--font-ui);
      font-size: 0.72rem;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      text-decoration: none;
      border: 1px solid rgba(240, 237, 230, 0.25);
      padding: 0.9em 1.8em;
      border-radius: 100px;
    }
    .lost a:hover { border-color: var(--gold); }
  </style>
</head>
<body class="overhaul">
  <main class="lost">
    <img src="/assets/journey/moon-1.webp" alt="">
    <h1>This path is not on the map.</h1>
    <p>The moths ate this page, or it never existed. The reading, however, is always waiting.</p>
    <a href="/">Return to the beginning</a>
  </main>
  <div class="grain-veil"></div>
</body>
</html>
